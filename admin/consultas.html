<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Consultas | PACKTRACK</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="../css/app.css">
</head>
<body>
    <div class="envoltura">
        <aside class="barra-lateral">
            <div>
                <div class="contenedor-logo">
                    <div class="icono-logo">    
                        <i class="bi bi-send-fill"></i>
                    </div>
                    <h3>PACKTRACK</h3>
                    <p>Sistema de Seguimiento</p>
                </div>
                <nav>
                    <a href="dashboard.html">
                        <i class="bi bi-speedometer2"></i>
                        Tablero
                    </a>
                    <a href="paquetes.html">
                        <i class="bi bi-box-seam"></i>
                        Paquetes
                    </a>
                    <a href="consultas.html" class="activo">
                        <i class="bi bi-chat-left-text"></i>
                        Consultas
                    </a>
                    <a href="sucursales.html">
                        <i class="bi bi-building"></i>
                        Sucursales
                    </a>
                    <a href="seguimientos.html">
                        <i class="bi bi-geo-alt"></i>
                        Seguimientos
                    </a>
                </nav>
            </div>
        </aside>
        <main class="contenido">
            <div class="barra-superior">
                <div>
                    <h2>Gestión de Consultas</h2>
                    <span class="text-muted">
                        Consultas realizadas por los clientes
                    </span>
                </div>
            </div>
            <div class="tarjeta-tablero">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h4 class="m-0">
                        Lista de Consultas
                    </h4>
                    <div class="d-flex gap-2">
                        <select
                            id="filtroEstado"
                            class="form-select"
                            onchange="filtrarConsultas()">
                            <option value="0">
                                Todas
                            </option>
                            <option value="1">
                                Pendientes
                            </option>
                            <option value="2">
                                Respondidas
                            </option>
                            <option value="3">
                                Cerradas
                            </option>
                        </select>
                    </div>
                </div>
                <div class="table-responsive">
                    <table class="table table-hover align-middle">
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Cliente</th>
                                <th>Asunto</th>
                                <th>Mensaje</th>
                                <th>Respuesta</th>
                                <th>Estado</th>
                                <th>Acciones</th>
                            </tr>
                        </thead>
                        <tbody id="tablaConsultas">
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>
    <script src="../js/admin/consultas.js"></script>
</body>
</html>
