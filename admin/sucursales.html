<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sucursales | PACKTRACK</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="../css/app.css">
</head>
<body>
<div class="envoltura">
    <aside class="barra-lateral">
        <div>
            <div class="contenedor-logo">
                <div class="icono-logo">
                    <i class="bi bi-send-fill"></i>
                </div>
                <h3>PACKTRACK</h3>
                <p>Sistema de Seguimiento</p>
            </div>
            <nav>
                <a href="dashboard.html">
                    <i class="bi bi-speedometer2"></i>
                    Tablero
                </a>
                <a href="paquetes.html">
                    <i class="bi bi-box-seam"></i>
                    Paquetes
                </a>
                <a href="consultas.html">
                    <i class="bi bi-chat-left-text"></i>
                    Consultas
                </a>
                <a href="sucursales.html"
                   class="activo">
                    <i class="bi bi-building"></i>
                    Sucursales
                </a>
                <a href="seguimientos.html">
                    <i class="bi bi-geo-alt"></i>
                    Seguimientos
                </a>
            </nav>
        </div>
    </aside>
    <main class="contenido">
        <div class="barra-superior">
            <div>
                <h2> Gestión de Sucursales</h2>
                <span class="text-muted">
                    Administración de agencias y centros logísticos
                </span>
            </div>
        </div>
        <div class="tarjeta-tablero">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h4 class="m-0">
                    Lista de Sucursales
                </h4>
                <button
                    class="btn btn-success"
                    data-bs-toggle="modal"
                    data-bs-target="#modalSucursal">
                    <i class="bi bi-plus-circle"></i>
                    Nueva Sucursal
                </button>
            </div>
            <div class="table-responsive">
                <table class="table table-hover align-middle">
                    <thead>
                    <tr>
                        <th>ID</th>
                        <th>Sucursal</th>
                        <th>Dirección</th>
                        <th>Teléfono</th>
                        <th>Ciudad</th>
                        <th>Acciones</th>
                    </tr>
                    </thead>
                    <tbody id="tablaSucursales">
                    </tbody>
                </table>
            </div>
        </div>
    </main>
</div>
<div class="modal fade"
    id="modalSucursal"
    tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">
                    Sucursal
                </h5>
                <button
                    type="button"
                    class="btn-close"
                    data-bs-dismiss="modal">
                </button>
            </div>
            <div class="modal-body">
                <form id="formSucursal">
                    <div class="mb-3">
                        <label class="form-label">
                            Nombre
                        </label>
                        <input
                            type="text"
                            id="nombre"
                            class="form-control"
                            required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">
                            Dirección
                        </label>
                        <input
                            type="text"
                            id="direccion"
                            class="form-control"
                            required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">
                            Teléfono
                        </label>
                        <input
                            type="text"
                            id="telefono"
                            class="form-control"
                            required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">
                            Ciudad
                        </label>
                        <select
                            id="ciudad_id"
                            class="form-select"
                            required>
                            <option value="">
                                Seleccione una ciudad
                            </option>
                        </select>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button
                    class="btn btn-secondary"
                    data-bs-dismiss="modal">
                    Cancelar
                </button>
                <button
                    id="btnGuardarSucursal"
                    class="btn btn-success"
                    onclick="guardarSucursal()">
                    Guardar
                </button>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="../js/admin/sucursales.js"></script>
</body>
