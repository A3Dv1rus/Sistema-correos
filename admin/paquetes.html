<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Paquetes | PACKTRACK</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="../css/app.css">
</head>
<body>
<div class="envoltura">
    <aside class="barra-lateral">
        <div>
            <div class="contenedor-logo">
                <div class="icono-logo">
                    <i class="bi bi-send-fill"></i>
                </div>
                <h3>PACKTRACK</h3>
                <p>
                    Sistema de Seguimiento
                </p>
            </div>
            <nav>
                <a href="dashboard.html">
                    <i class="bi bi-speedometer2"></i>
                    Tablero
                </a>
                <a href="paquetes.html" class="activo">
                    <i class="bi bi-box-seam"></i>
                    Paquetes
                </a>
                <a href="consultas.html">
                    <i class="bi bi-chat-left-text"></i>
                    Consultas
                </a>
                <a href="sucursales.html">
                    <i class="bi bi-building"></i>
                    Sucursales
                </a>
                <a href="seguimientos.html">
                    <i class="bi bi-geo-alt"></i>
                    Seguimientos
                </a>
            </nav>
        </div>
    </aside>
    <main class="contenido">
        <div class="barra-superior">
            <div>
                <h2>
                    Gestión de Paquetes
                </h2>
                <span class="text-muted">
                    Administración de envíos y seguimiento
                </span>
            </div>
        </div>
        <div class="tarjeta-tablero">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h4 class="m-0">
                    Lista de Paquetes
                </h4>
                <button
                    type="button"
                    class="btn btn-success"
                    data-bs-toggle="modal"
                    data-bs-target="#modalPaquete">
                    <i class="bi bi-plus-circle"></i>
                    Agregar Paquete
                </button>
            </div>
            <div class="table-responsive">
                <table class="table table-hover align-middle">
                    <thead>
                    <tr>
                        <th>Código</th>
                        <th>Título</th>
                        <th>Cliente</th>
                        <th>Origen</th>
                        <th>Destino</th>
                        <th>Salida</th>
                        <th>Entrega</th>
                        <th>Acciones</th>
                    </tr>
                    </thead>
                    <tbody id="tablaPaquetes">
                    </tbody>
                </table>
            </div>
        </div>
    </main>
</div>
<div class="modal fade" id="modalPaquete" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">
                    Registrar Nuevo Paquete
                </h5>
                <button
                    type="button"
                    class="btn-close"
                    data-bs-dismiss="modal">
                </button>
            </div>
            <div class="modal-body">
                <form id="formPaquete">
                    <div class="mb-3">
                        <label for="titulo" class="form-label">
                            Título
                        </label>
                        <input
                            type="text"
                            id="titulo"
                            class="form-control"
                            required>
                    </div>
                    <div class="mb-3">
                        <label for="descripcion" class="form-label">
                            Descripción
                        </label>
                        <textarea
                            id="descripcion"
                            class="form-control"
                            rows="3"
                            required></textarea>
                    </div>
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="user_id" class="form-label">
                                Cliente
                            </label>
                            <select
                                id="user_id"
                                class="form-select"
                                required>
                                <option value="">
                                    Seleccione un cliente
                                </option>
                            </select>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label for="fecha_salida" class="form-label">
                                Fecha de Salida
                            </label>
                            <input
                                type="date"
                                id="fecha_salida"
                                class="form-control"
                                required>
                        </div>
                    </div>
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="sucursal_origen_id" class="form-label">
                                Sucursal Origen
                            </label>
                            <select
                                id="sucursal_origen_id"
                                class="form-select"
                                required>
                                <option value="">
                                    Seleccione una sucursal
                                </option>
                            </select>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label for="sucursal_destino_id" class="form-label">
                                Sucursal Destino
                            </label>
                            <select
                                id="sucursal_destino_id"
                                class="form-select"
                                required>
                                <option value="">
                                    Seleccione una sucursal
                                </option>
                            </select>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label for="fecha_entrega" class="form-label">
                            Fecha de Entrega
                        </label>
                        <input
                            type="date"
                            id="fecha_entrega"
                            class="form-control">
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button
                    type="button"
                    class="btn btn-secondary"
                    data-bs-dismiss="modal">
                    Cancelar
                </button>
                <button
                    type="button"
                    id="btnGuardarPaquete"
                    class="btn btn-success"
                    onclick="guardarPaquete()">
                    Guardar Paquete
                </button>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="../js/admin/paquetes.js"></script>

</body>
</html>
