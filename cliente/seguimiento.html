<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seguimiento de Paquetes - PACKTRACK</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body {
            background: #f5f7fa;
        }
        .linea-tiempo-item {
            border-left: 4px solid #0d6efd;
            padding-left: 15px;
            margin-bottom: 20px;
        }
        .encabezado-seguimiento {
            background: linear-gradient(135deg, #0d6efd, #084298);
            color: white;
            border-radius: 15px;
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow">
        <div class="container">
            <a class="navbar-brand" href="cliente-dashboard.html">
                <i class="bi bi-send-fill"></i> PACKTRACK
            </a>
            <div class="ms-auto">
                <a href="cliente-dashboard.html" class="btn btn-light">Volver al Panel</a>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <div class="encabezado-seguimiento p-4 shadow">
            <h2>Seguimiento de Paquetes</h2>
            <p class="mb-0">Consulta el estado actual de tus envíos.</p>
        </div>

        <div class="card shadow mt-4">
            <div class="card-body">
                <div class="row">
                    <div class="col-md-10">
                        <input type="text" id="codigoSeguimiento" class="form-control" placeholder="Ingrese código de seguimiento">
                    </div>
                    <div class="col-md-2">
                        <button id="btnBuscar" class="btn btn-primary w-100">Buscar</button>
                    </div>
                </div>
            </div>
        </div>

        <div id="resultado" class="mt-4" style="display:none;">
            <div class="card shadow">
                <div class="card-header bg-primary text-white">Información del Paquete</div>
                <div class="card-body">
                    <div class="row">
                        <div class="col-md-6">
                            <p><strong>Código:</strong> <span id="infoCodigo"></span></p>
                            <p><strong>Título:</strong> <span id="infoTitulo"></span></p>
                            <p><strong>Estado:</strong> <span id="infoEstado"></span></p>
                        </div>
                        <div class="col-md-6">
                            <p><strong>Origen:</strong> <span id="infoOrigen"></span></p>
                            <p><strong>Destino:</strong> <span id="infoDestino"></span></p>
                            <p><strong>Entrega:</strong> <span id="infoEntrega"></span></p>
                        </div>
                    </div>
                </div>
            </div>

            <div class="card shadow mt-4">
                <div class="card-header bg-success text-white">Historial de Seguimiento</div>
                <div class="card-body">
                    <div id="historialContainer"></div>
                </div>
            </div>
        </div>
    </div>

    <script src="../js/cliente/seguimiento.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
