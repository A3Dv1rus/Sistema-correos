<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Perfil - PACKTRACK</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body {
            background: #f5f7fa;
        }
        .tarjeta-perfil {
            border: none;
            border-radius: 15px;
        }
        .avatar {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: #0d6efd;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 60px;
            margin: auto;
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow">
        <div class="container">
            <a class="navbar-brand" href="cliente-dashboard.html">
                <i class="bi bi-send-fill"></i> PACKTRACK
            </a>
            <div class="ms-auto">
                <a href="cliente-dashboard.html" class="btn btn-light">Volver al Panel</a>
            </div>
        </div>
    </nav>

    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-lg-8">
                <div class="card shadow tarjeta-perfil">
                    <div class="card-body p-5">
                        <div class="text-center">
                            <div class="avatar">
                                <i class="bi bi-person-fill"></i>
                            </div>
                            <h2 id="nombreTitulo" class="mt-3"></h2>
                            <p id="correoTitulo" class="text-muted"></p>
                        </div>
                        <hr>
                        <form id="formPerfil">
                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label class="form-label">Nombre</label>
                                    <input type="text" id="nombre" class="form-control">
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label class="form-label">Correo Electrónico</label>
                                    <input type="email" id="email" class="form-control">
                                </div>
                            </div>
                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label class="form-label">Rol</label>
                                    <input type="text" id="rol" class="form-control" readonly>
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label class="form-label">ID Usuario</label>
                                    <input type="text" id="usuarioId" class="form-control" readonly>
                                </div>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Fecha de Registro</label>
                                <input type="text" id="fechaRegistro" class="form-control" readonly>
                            </div>
                            <button type="submit" class="btn btn-primary">Actualizar Perfil</button>
                        </form>
                        <div id="mensaje" class="mt-3"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="../js/cliente/perfil.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
