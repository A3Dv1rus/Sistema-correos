<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mis Consultas - PACKTRACK</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body {
            background: #f5f7fa;
        }
        .estado-pendiente {
            background: #ffc107;
            color: #000;
        }
        .estado-respondida {
            background: #198754;
            color: #fff;
        }
        .estado-cerrada {
            background: #dc3545;
            color: #fff;
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow">
        <div class="container">
            <a class="navbar-brand" href="cliente-dashboard.html">
                <i class="bi bi-send-fill"></i> PACKTRACK
            </a>
            <div class="ms-auto">
                <a href="cliente-dashboard.html" class="btn btn-light">Volver al Panel</a>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <div class="row">
            <div class="col-lg-12">
                <div class="card shadow">
                    <div class="card-header bg-primary text-white d-flex justify-content-between align-items-center">
                        <span>Mis Consultas</span>
                        <button class="btn btn-warning" data-bs-toggle="modal" data-bs-target="#modalConsulta">Nueva Consulta</button>
                    </div>
                    <div class="card-body">
                        <div class="table-responsive">
                            <table class="table table-striped">
                                <thead>
                                    <tr>
                                        <th>ID</th>
                                        <th>Asunto</th>
                                        <th>Mensaje</th>
                                        <th>Respuesta</th>
                                        <th>Estado</th>
                                    </tr>
                                </thead>
                                <tbody id="tablaConsultas"></tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="modalConsulta" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Nueva Consulta</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="formConsulta">
                        <div class="mb-3">
                            <label class="form-label">Asunto</label>
                            <input type="text" id="asunto" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Mensaje</label>
                            <textarea id="mensaje" rows="4" class="form-control" required></textarea>
                        </div>
                        <button class="btn btn-primary w-100" type="submit">Enviar Consulta</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="../js/cliente/mis-consultas.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
