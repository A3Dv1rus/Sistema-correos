<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mis Paquetes - PACKTRACK</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body {
            background: #f5f7fa;
        }
        .tarjeta-resumen {
            border: none;
            transition: .3s;
        }
        .tarjeta-resumen:hover {
            transform: translateY(-5px);
        }
        .estado {
            font-weight: bold;
        }
        .linea-tiempo-item {
            border-left: 3px solid #0d6efd;
            padding-left: 15px;
            margin-bottom: 15px;
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow">
        <div class="container">
            <a class="navbar-brand" href="cliente-dashboard.html">
                <i class="bi bi-send-fill"></i> PACKTRACK
            </a>
            <div class="ms-auto">
                <a href="cliente-dashboard.html" class="btn btn-light">Volver al Panel</a>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <div class="row g-4">
            <div class="col-md-4">
                <div class="card shadow tarjeta-resumen">
                    <div class="card-body text-center">
                        <i class="bi bi-box-seam fs-1 text-primary"></i>
                        <h3 id="totalPaquetes">0</h3>
                        <p>Total de Paquetes</p>
                    </div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card shadow tarjeta-resumen">
                    <div class="card-body text-center">
                        <i class="bi bi-truck fs-1 text-success"></i>
                        <h3 id="enTransito">0</h3>
                        <p>En Tránsito</p>
                    </div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card shadow tarjeta-resumen">
                    <div class="card-body text-center">
                        <i class="bi bi-check-circle fs-1 text-warning"></i>
                        <h3 id="entregados">0</h3>
                        <p>Entregados</p>
                    </div>
                </div>
            </div>
        </div>

        <div class="card shadow mt-4">
            <div class="card-header bg-primary text-white">Mis Paquetes</div>
            <div class="card-body">
                <div class="row mb-3">
                    <div class="col-md-6">
                        <input type="text" id="buscar" class="form-control" placeholder="Buscar por código o título">
                    </div>
                </div>
                <div class="table-responsive">
                    <table class="table table-striped table-hover">
                        <thead>
                            <tr>
                                <th>Código</th>
                                <th>Título</th>
                                <th>Origen</th>
                                <th>Destino</th>
                                <th>Salida</th>
                                <th>Entrega</th>
                                <th>Estado</th>
                                <th>Acciones</th>
                            </tr>
                        </thead>
                        <tbody id="tablaPaquetes"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="modalHistorial" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Historial de Seguimiento</h5>
                    <button class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <div id="historialContainer"></div>
                </div>
            </div>
        </div>
    </div>

    <script src="../js/cliente/mis-paquetes.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
