<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Paquetería</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="contenedor-login">
        <div class="login-card">
            <div class="text-center mb-4">
                <div class="circulo-logo">📦</div>
                <h2 class="mt-3 fw-bold">Sistema de Paquetería</h2>
                <p class="text-muted">Ingrese sus credenciales</p>
            </div>
            <form onsubmit="event.preventDefault(); login();">
                <div class="mb-3">
                    <label class="form-label">Correo Electrónico</label>
                    <input type="email" id="email" class="form-control" placeholder="admin@correo.com" required>
                </div>
                <div class="mb-4">
                    <label class="form-label">Contraseña</label>
                    <input type="password" id="password" class="form-control" placeholder="********" required>
                </div>
                <button type="submit" class="btn btn-primary w-100 btn-ingresar">Iniciar Sesión</button>
            </form>
            <div class="text-center mt-3">
                ¿No tienes cuenta? <a href="registro.html">Registrarse</a>
            </div>
            <div class="text-center mt-4">
                <small class="text-muted">Sistema de Gestión y Seguimiento de Envíos</small>
            </div>
        </div>
    </div>
    <script src="js/auth.js"></script>
</body>
</html>
