<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro | PACKTRACK</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="css/app.css">
</head>
<body class="bg-light">
    <div class="container" style="background-color: #0d6efd;">
        <div class="row justify-content-center align-items-center vh-100">
            <div class="col-md-5">
                <div class="card shadow border-0">
                    <div class="card-body p-5">
                        <div class="text-center mb-4">
                            <i class="bi bi-send-fill fs-1 text-primary"></i>
                            <h2 class="mt-2">PACKTRACK</h2>
                            <p class="text-muted">Crear nueva cuenta</p>
                        </div>
                        <form id="formRegistro">
                            <div class="mb-3">
                                <label class="form-label">Nombre Completo</label>
                                <input type="text" id="nombre" class="form-control" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Correo Electrónico</label>
                                <input type="email" id="email" class="form-control" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Contraseña</label>
                                <input type="password" id="password" class="form-control" required>
                            </div>
                            <div class="mb-4">
                                <label class="form-label">Confirmar Contraseña</label>
                                <input type="password" id="password_confirmation" class="form-control" required>
                            </div>
                            <button type="submit" class="btn btn-primary w-100">
                                <i class="bi bi-person-plus-fill"></i> Registrarse
                            </button>
                        </form>
                        <div class="text-center mt-4">
                            <a href="login.html" class="text-decoration-none">¿Ya tienes cuenta? Iniciar sesión</a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="js/registro.js"></script>
</body>
</html>
